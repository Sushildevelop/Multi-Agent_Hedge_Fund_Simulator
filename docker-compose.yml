services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: hedge-api
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      MONGO_URI: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: hedge-worker
    command: python -m apps.worker.main
    environment:
      PYTHONUNBUFFERED: "1"
      MONGO_URI: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: hedge-scheduler
    command: python -m apps.scheduler.scheduler
    environment:
      PYTHONUNBUFFERED: "1"
      MONGO_URI: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: hedge-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hedge_fund
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: hedge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
